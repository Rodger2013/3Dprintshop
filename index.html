<!DOCTYPE html>
<html>

<head>

<title>3Dprintshop</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}


/* logo */

.logo{

position:absolute;
top:20px;
left:25px;
font-size:30px;
font-weight:bold;

}

.blue{
color:blue;
}

.red{
color:red;
}


header{

height:80px;
background:white;
border-bottom:5px solid yellow;

}



/* FEATURE TITLE */

.title{

padding:20px;
font-size:25px;
border-bottom:5px solid yellow;

}



/* MOVING BOXES */

.slider{

overflow:hidden;
background:white;
padding:20px;
border-bottom:5px solid yellow;

}


.track{

display:flex;
gap:20px;
animation:slide 15s linear infinite;

}



.box{

min-width:220px;
height:180px;
background:#ddd;
border-radius:15px;
text-align:center;
padding:15px;

}



.box img{

width:150px;
height:120px;
object-fit:cover;
border-radius:10px;

}



@keyframes slide{


from{

transform:translateX(100%);

}


to{

transform:translateX(-100%);

}


}





.section{

padding:25px;
border-bottom:5px solid yellow;

}



.card{

background:white;
padding:20px;
margin:10px;
border-radius:15px;

}



button{

padding:10px;

}



input{

padding:10px;

}


</style>


</head>


<body>



<header>


<div class="logo">

<span class="blue">3D</span><span class="red">printshop</span>


</div>


</header>





<!-- MOVING FEATURE AREA -->


<div class="title">

Featured

</div>



<div class="slider">


<div class="track">


<div class="box">

<img src="">

<p>New Item</p>

</div>



<div class="box">

<img src="">

<p>Coming Soon</p>

</div>



<div class="box">

<img src="">

<p>Popular Print</p>

</div>



<div class="box">

<img src="">

<p>Custom Design</p>

</div>



<div class="box">

<img src="">

<p>New Color</p>

</div>



<div class="box">

<img src="">

<p>Limited Print</p>

</div>



</div>


</div>







<!-- NEW RELEASES -->


<div class="section">


<h2>New Releases</h2>


<div id="products">


<h3>No items for sale yet</h3>

<p>Check back soon!</p>


</div>


</div>







<!-- OTHER STUFF -->


<div class="section">


<h2>Other Stuff</h2>



<div class="card">

About 3Dprintshop

</div>



<div class="card">

Custom orders coming soon

</div>



</div>






<script>


let products=[];



function showProducts(){


let area=document.getElementById("products");


area.innerHTML="";



if(products.length===0){


area.innerHTML="No items for sale yet";

return;


}



products.forEach(p=>{


area.innerHTML += `


<div class="card">

<h2>${p.name}</h2>

<p>$${p.price}</p>

<button>Buy</button>

</div>


`;


});


}


</script>



</body>

</html>

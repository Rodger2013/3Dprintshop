<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Underplay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #050505;
      color: white;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(90deg,#111,#1a1a1a,#111);
      border-bottom: 3px solid #00bfff;
    }

    h1 {
      font-size: 4rem;
      color: #00bfff;
      text-shadow: 0 0 20px #00bfff;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 1.2rem;
      color: #ccc;
    }

    .elements {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
      gap: 20px;
      padding: 40px;
    }

    .element-btn {
      border: none;
      padding: 25px;
      border-radius: 20px;
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.25s;
    }

    .element-btn:hover {
      transform: scale(1.06);
    }

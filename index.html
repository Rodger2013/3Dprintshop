<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNDERPLAY</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

header{
padding:40px;
text-align:center;
background:linear-gradient(90deg,#111,#1a1a1a,#111);
border-bottom:3px solid #ffe600;
}

header h1{
font-size:4rem;
color:#ffe600;
text-shadow:0 0 20px #ffe600;
}

header p{
margin-top:10px;
color:#aaa;
}

.energy{
margin-top:20px;
font-size:1.4rem;
}

.shop{
padding:40px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.pack{
background:#111;
border-radius:25px;
overflow:hidden;
border:3px solid #222;
transition:.25s;
}

.pack:hover{
transform:translateY(-10px);
}

.pack-top{
padding:30px;
text-align:center;
font-size:2rem;
font-weight:bold;
}

.static{
background:linear-gradient(135deg,#ffe600,#ffae00);
color:black;
}

.blaze{
background:linear-gradient(135deg,#ff6600,#ff0000);
}

.splash{
background:linear-gradient(135deg,#00bfff,#0044ff);
}

.pack-body{
padding:25px;
}

.buy-btn{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-size:1.1rem;
font-weight:bold;
cursor:pointer;
margin-top:20px;
}

.static-btn{
background:#ffe600;
}

.blaze-btn{
background:#ff5e00;
color:white;
}

.splash-btn{
background:#00bfff;
color:white;
}

.pull{
padding:40px;
text-align:center;
}

.card{
max-width:400px;
margin:auto;
background:#111;
border-radius:25px;
overflow:hidden;
border:4px solid #333;
display:none;
}

.card-art{
height:300px;
display:flex;
align-items:center;
justify-content:center;
font-size:3rem;
font-weight:bold;
}

.card-content{
padding:20px;
}

.rarity{
display:inline-block;
padding:8px 14px;
border-radius:999px;
margin-bottom:15px;
font-weight:bold;
}

.basic{
background:#666;
}

.rare{
background:#009dff;
}

.epic{
background:#a100ff;
}

.legendary{
background:#ffb700;
color:black;
}

.mythic{
background:#ff006a;
}

.god{
background:#fff700;
color:black;
}

.secret{
background:#00fff2;
color:black;
}

.impossibleun{
background:linear-gradient(90deg,red,orange,yellow,green,blue,purple);
}

footer{
padding:40px;
text-align:center;
color:#777;
}
</style>
</head>

<body>

<header>
<h1>UNDERPLAY</h1>
<p>Collect • Open Packs • Pull Rare Cards</p>

<div class="energy">
Energy: <span id="energy">100</span> ⚡
</div>
</header>

<section class="shop">

<div class="pack">
<div class="pack-top static">
STATIC PACK ⚡
</div>

<div class="pack-body">
<p>Electric creatures and storm monsters.</p>

<button class="buy-btn static-btn" onclick="buyPack('static')">
BUY • 10 ENERGY
</button>
</div>
</div>

<div class="pack">
<div class="pack-top blaze">
BLAZE PACK 🔥
</div>

<div class="pack-body">
<p>Fire creatures and lava beasts.</p>

<button class="buy-btn blaze-btn" onclick="buyPack('blaze')">
BUY • 10 ENERGY
</button>
</div>
</div>

<div class="pack">
<div class="pack-top splash">
SPLASH PACK 🌊
</div>

<div class="pack-body">
<p>Ocean creatures and tidal gods.</p>

<button class="buy-btn splash-btn" onclick="buyPack('splash')">
BUY • 10 ENERGY
</button>
</div>
</div>

</section>

<section class="pull">

<div class="card" id="card">

<div class="card-art" id="cardArt">
⚡
</div>

<div class="card-content">

<div class="rarity" id="rarity">
BASIC
</div>

<h2 id="cardName">Voltix</h2>

<p id="cardDesc">
Electric fox creature.
</p>

</div>
</div>

</section>

<footer>
UNDERPLAY © 2026
</footer>

<script>

let energy = 100;

const staticCards = [
{
name:"Voltix",
rarity:"basic",
emoji:"⚡",
desc:"Electric fox creature.",
color:"#ffe600"
},
{
name:"Sparkbug",
rarity:"rare",
emoji:"⚡",
desc:"Tiny lightning insect.",
color:"#00bfff"
},
{
name:"Plasmawing",
rarity:"epic",
emoji:"⚡",
desc:"Storm dragon.",
color:"#a100ff"
},
{
name:"Zapexus",
rarity:"legendary",
emoji:"⚡",
desc:"Voltage dragon.",
color:"#ffb700"
},
{
name:"Thunderlord",
rarity:"mythic",
emoji:"⚡",
desc:"King of storms.",
color:"#ff006a"
},
{
name:"Zeuson",
rarity:"god",
emoji:"⚡",
desc:"God of thunder.",
color:"#fff700"
},
{
name:"Eclipzap",
rarity:"secret",
emoji:"⚡",
desc:"Hidden storm creature.",
color:"#00fff2"
},
{
name:"Impossibleibun",
rarity:"impossibleun",
emoji:"🌈",
desc:"Impossible electric being.",
color:"#ff00ff"
}
];

const blazeCards = [
{
name:"Emberpup",
rarity:"basic",
emoji:"🔥",
desc:"Tiny fire puppy.",
color:"#ff6600"
},
{
name:"Lavabite",
rarity:"rare",
emoji:"🔥",
desc:"Magma wolf.",
color:"#ff3300"
},
{
name:"Volcannon",
rarity:"epic",
emoji:"🔥",
desc:"Explosive lava titan.",
color:"#a100ff"
},
{
name:"Inferdragon",
rarity:"legendary",
emoji:"🔥",
desc:"Ancient inferno dragon.",
color:"#ffb700"
},
{
name:"Infernalis",
rarity:"mythic",
emoji:"🔥",
desc:"Blaze ruler.",
color:"#ff006a"
},
{
name:"Igniflare",
rarity:"god",
emoji:"🔥",
desc:"God of flames.",
color:"#fff700"
},
{
name:"WorldBlaze",
rarity:"secret",
emoji:"🔥",
desc:"Burns worlds apart.",
color:"#00fff2"
},
{
name:"Infernal Colossus",
rarity:"impossibleun",
emoji:"🌈",
desc:"Ultimate fire monster.",
color:"#ff00ff"
}
];

const splashCards = [
{
name:"Aquabub",
rarity:"basic",
emoji:"🌊",
desc:"Tiny water spirit.",
color:"#00bfff"
},
{
name:"Wavefin",
rarity:"rare",
emoji:"🌊",
desc:"Fast ocean hunter.",
color:"#0088ff"
},
{
name:"Cyclonova",
rarity:"epic",
emoji:"🌊",
desc:"Tidal storm beast.",
color:"#a100ff"
},
{
name:"Poseidragon",
rarity:"legendary",
emoji:"🌊",
desc:"Ocean emperor dragon.",
color:"#ffb700"
},
{
name:"Thalassar",
rarity:"mythic",
emoji:"🌊",
desc:"Controls all seas.",
color:"#ff006a"
},
{
name:"Neptulon",
rarity:"god",
emoji:"🌊",
desc:"God of oceans.",
color:"#fff700"
},
{
name:"Voidsphere",
rarity:"secret",
emoji:"🌊",
desc:"Hidden sea void.",
color:"#00fff2"
},
{
name:"Ocean Eternis",
rarity:"impossibleun",
emoji:"🌈",
desc:"Infinite sea titan.",
color:"#ff00ff"
}
];

function buyPack(type){

if(energy < 10){
alert("Not enough energy!");
return;
}

energy -= 10;

document.getElementById("energy").innerText = energy;

let cards;

if(type === "static"){
cards = staticCards;
}

if(type === "blaze"){
cards = blazeCards;
}

if(type === "splash"){
cards = splashCards;
}

const card = cards[Math.floor(Math.random() * cards.length)];

document.getElementById("card").style.display = "block";

document.getElementById("cardArt").innerText = card.emoji;

document.getElementById("cardArt").style.background = card.color;

document.getElementById("cardName").innerText = card.name;

document.getElementById("cardDesc").innerText = card.desc;

const rarity = document.getElementById("rarity");

rarity.className = "rarity " + card.rarity;

rarity.innerText = card.rarity.toUpperCase();

}

</script>

</body>
</html>

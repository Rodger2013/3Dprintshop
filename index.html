<!DOCTYPE html>
<html>

<head>

<title>3Dprintshop</title>

<style>


body{

font-family:Arial;
margin:0;
background:#f4f4f4;

}



/* yellow name line */

.logoBar{

background:white;

border-bottom:5px solid yellow;

border-top:5px solid yellow;

padding:20px;

}



.logo{

font-size:32px;

font-weight:bold;

}



.blue{

color:blue;

}


.red{

color:red;

}




/* moving boxes */


.featureTitle{

padding:20px;

border-bottom:5px solid yellow;

font-size:25px;

}



.slider{

overflow:hidden;

background:white;

padding:20px;

border-bottom:5px solid yellow;

}



.track{

display:flex;

gap:20px;

animation:move 15s linear infinite;

}



.box{

min-width:220px;

height:200px;

background:#ddd;

border-radius:15px;

text-align:center;

padding:10px;

}



.box img{

width:160px;

height:130px;

object-fit:cover;

border-radius:10px;

}



@keyframes move{


from{

transform:translateX(100%);

}


to{

transform:translateX(-100%);

}


}




.section{

padding:25px;

border-bottom:5px solid yellow;

}




.card{

background:white;

padding:20px;

margin:15px;

border-radius:15px;

}



input{

padding:10px;

margin:5px;

}



button{

padding:10px;

cursor:pointer;

}



</style>

</head>




<body>




<div class="logoBar">


<div class="logo">

<span class="blue">3D</span><span class="red">printshop</span>

</div>


</div>







<div class="featureTitle">

Featured

</div>



<div class="slider">


<div id="featured" class="track">


</div>


</div>








<div class="section">


<h2>New Releases</h2>


<div id="products">


<h3>No items for sale yet</h3>


</div>


</div>









<div class="section">


<h2>Other Stuff</h2>


<div class="card">

Custom 3D Prints

</div>


<div class="card">

More coming soon

</div>


</div>









<!-- ADMIN PANEL -->


<div class="section">


<h2>Admin Panel</h2>


<p>Owner controls</p>



<input id="itemName" placeholder="Name">


<input id="itemPrice" placeholder="Price">


<input id="itemImage" placeholder="Image URL">



<button onclick="addItem()">

Add Item

</button>



</div>







<script>


let products=[];


let featured=[];






function addItem(){



let name=document.getElementById("itemName").value;


let price=document.getElementById("itemPrice").value;


let image=document.getElementById("itemImage").value;




let item={

name:name,

price:price,

image:image

};




products.push(item);


featured.push(item);



show();


}







function show(){



let productBox=document.getElementById("products");


let featureBox=document.getElementById("featured");



productBox.innerHTML="";

featureBox.innerHTML="";




products.forEach(p=>{


productBox.innerHTML += `


<div class="card">


<h2>${p.name}</h2>

<p>$${p.price}</p>


<button>

Buy

</button>


</div>


`;



});





featured.forEach(p=>{


featureBox.innerHTML += `


<div class="box">


<img src="${p.image}">


<h3>${p.name}</h3>


</div>


`;



});




}



</script>




</body>

</html>

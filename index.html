<!DOCTYPE html>
<html>
<head>
<title>PrintHub</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:30px;
}

.box{
background:white;
padding:20px;
margin:15px;
border-radius:10px;
}

button{
padding:10px;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
}

</style>

</head>


<body>


<h1>PrintHub</h1>

<h2>3D Printed Products</h2>


<div id="shop" class="box">

<h2>No items for sale yet</h2>

<p>Check back soon!</p>

</div>



<hr>


<h2>Owner Admin</h2>

<p>Only business owners can add products</p>


<div class="box">


<input id="name" placeholder="Product name">


<input id="price" placeholder="Price">


<button onclick="addProduct()">

Add 3D Print

</button>


</div>



<script>


let products = [];



function addProduct(){


let name =
document.getElementById("name").value;


let price =
document.getElementById("price").value;



if(name=="" || price==""){

alert("Fill everything");

return;

}



products.push({

name:name,

price:price

});



document.getElementById("name").value="";

document.getElementById("price").value="";



showProducts();


}




function showProducts(){


let shop =
document.getElementById("shop");



if(products.length===0){


shop.innerHTML=

"<h2>No items for sale yet</h2><p>Check back soon!</p>";

return;

}



shop.innerHTML="";



products.forEach(product=>{


shop.innerHTML += `

<div class="box">

<h2>${product.name}</h2>

<p>$${product.price}</p>


<button>

Buy

</button>


</div>

`;


});


}



</script>



</body>

</html>
